<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | Matteo's Birthday</title>
    <script>
      document.documentElement.classList.add("has-js");
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&amp;family=Roboto:wght@300;400;500;700&amp;family=Catamaran:wght@400;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="subpage thank-you-page lego-theme" data-thank-you-page data-nav-current="registration">
    <div data-site-header></div>

    <main class="subpage-main">
      <section class="subpage-hero">
        <div class="container subpage-hero-inner">
          <div class="subpage-copy reveal">
            <p class="hero-kicker">RSVP received</p>
            <h1>
              Thanks,
              <span class="hero-accent" data-thank-you-name>friend</span>.
            </h1>
            <p class="hero-date">
              <time data-display-date datetime=""></time>
            </p>
            <p class="hero-venue">
              <span data-display-time></span>
              <span class="hero-separator">|</span>
              <span data-venue-name></span>
            </p>
            <p class="hero-lead" data-thank-you-copy>
              We have your RSVP.
            </p>

            <div class="hero-actions">
              <a class="button button-primary brick-6" href="index.html">Back to event page</a>
              <a class="button button-dark-outline brick-5" href="work_in_progress.html">Open music page</a>
              <button class="button button-outline brick-5" type="button" data-download-ics>
                Add to calendar
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div data-site-footer></div>

    <script src="script.js"></script>
  </body>
</html>
