<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | Matteo's Birthday</title>
    <script>
      document.documentElement.classList.add("has-js");
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link

      <section class="subpage-hero">
        <div class="container subpage-hero-inner">

            </p>

            <div class="hero-actions">
                  <a class="button button-dark-outline brick-6" href="directions.html">
                    How to get there
                  </a>
                  <a class="button button-primary brick-5" href="work_in_progress.html">

          </div>
